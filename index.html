<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>მორიგე ექიმების კალენდარი (დემო)</title>
  <link rel="icon" type="image/png" href="./calendar.png" />
  <meta name="description" content="კლინიკისთვის დემო მორიგეობის კალენდარი" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BPG+Nino+Mtavruli:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/calendar-demo.css" />
  <script src="./assets/calendar-demo.js" defer></script>
</head>
<body>
  <div id="status" class="status">იტვირთება...</div>
  <div class="container">
    <div class="header">
      <h1>მორიგე ექიმების კალენდარი (დემო)</h1>
      <p>დემო ვერსია: მონაცემები ინახება მხოლოდ ამ ბრაუზერში</p>
      <button class="add-shift-btn" id="open-modal-btn" type="button">+</button>
    </div>
    <div class="calendar-section">
      <div class="calendar-header">
        <h2 id="month-year"></h2>
        <div>
          <button class="nav-btn" id="prev-month" type="button">წინა</button>
          <button class="nav-btn" id="today-btn" type="button">დღეს</button>
          <button class="nav-btn" id="next-month" type="button">შემდეგი</button>
        </div>
      </div>
      <div id="calendar-grid" class="calendar-grid">
        <div class="day-name">ორშ</div><div class="day-name">სამ</div><div class="day-name">ოთხ</div><div class="day-name">ხუთ</div><div class="day-name">პარ</div><div class="day-name">შაბ</div><div class="day-name">კვი</div>
      </div>
      <div id="selected-date-view" class="selected-date-view hidden">
        <h3 id="selected-date-title"></h3>
        <input type="text" id="dept-search" class="dept-search" placeholder="ძებნა განყოფილებაში..." />
        <div id="departments-grid" class="departments-grid"></div>
        <button class="export-btn" id="export-excel" type="button">Excel ექსპორტი (განყოფილებებით)</button>
      </div>
    </div>
  </div>

  <div class="modal" id="shift-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🗓️ მორიგეობის დამატება</h3>
        <button class="modal-close" id="close-modal" type="button" aria-label="დახურვა">✕</button>
      </div>
      <div class="modal-tabs">
        <button class="tab-btn active" id="tab-shift" type="button">მორიგეობა</button>
        <button class="tab-btn" id="tab-new-doctor" type="button">ახალი ექიმი</button>
      </div>
      <div class="modal-body">
        <div id="shift-tab-panel">
          <div class="form-group"><label>განყოფილება</label><select id="specialty-filter"><option value="">ყველა განყოფილება</option></select></div>
          <div class="form-group"><label>ექიმი</label><input type="text" id="doctor-search" class="search-input" placeholder="სახელი ან ტელეფონი..." /></div>
          <div class="doctor-list" id="doctor-list"></div>
          <div class="modal-grid-2">
            <div class="form-group"><label>თარიღი</label><input type="date" id="modal-date" required /></div>
            <div class="form-group"><label>მორიგეობა</label>
              <select id="modal-hours" required>
                <option value="">აირჩიეთ</option>
                <option value="8">8 საათი</option>
                <option value="12">12 საათი</option>
                <option value="16">16 საათი</option>
                <option value="24">24 საათი</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>გამეორება</label>
            <select id="repeat-type">
              <option value="none">არ განმეორდეს</option>
              <option value="daily">ყოველ სამუშაო დღეს (ორშ-პარ)</option>
              <option value="every2">ყოველ 2 დღეში</option>
              <option value="every4">ყოველ 4 დღეში</option>
            </select>
            <input type="number" id="repeat-until" placeholder="დღეების რაოდენობა (მაგ. 30)" class="hidden repeat-until-input" min="1" />
          </div>
          <div class="form-group"><label>ტელეფონი</label><input type="tel" id="modal-phone" readonly /></div>
          <button class="btn btn-primary" id="add-shift-final" type="button">+ მორიგეობის დამატება</button>
        </div>

        <div id="new-doctor-tab-panel" class="hidden">
          <div class="form-group"><label>სახელი და გვარი</label><input type="text" id="new-name" placeholder="მაგ: ნინო ბერიძე" /></div>
          <div class="form-group">
            <label>განყოფილება</label>
            <select id="new-specialty-select">
              <option value="">აირჩიეთ განყოფილება</option>
              <option>CT ოპერატორი</option><option>CT რადიოლოგი</option><option>ანგიოქირურგია</option><option>გადაუდებელი მედიცინა</option><option>გინეკოლოგია</option><option>ენდოსკოპია</option><option>ექოსკოპია</option><option>ზოგადი რეანიმაცია</option><option>ზოგადი ქირურგია</option><option>თორაკო ქირურგია</option><option>ინფექციური სნეულებები</option><option>კარდიოლოგია</option><option>ლაბორატორია</option><option>ნევროლოგია</option><option>ნეირო ქირურგია</option><option>ნეფროლოგია</option><option>პულმონოლოგია</option><option>X-ray რადიოლოგი</option><option>რენტგენი</option><option>ტრავმატოლოგია</option><option>უროლოგია</option><option>ყბა–სახის ქირურგია</option><option>შინაგანი მედიცინა</option><option>ნეირო რეანიმაცია</option><option>კარდიო რეანიმაცია</option><option>ბავშვთა რეანიმაცია</option><option>ბავშვთა გადაუდებელი მედიცინა</option><option>ბავშვთა ონკო-ჰემატოლოგია</option><option>ბავშვთა ქირურგია</option><option>პედიატრია</option><option>ანესთეზია</option><option>ჰემატოლოგია 3</option><option>ჰემატოლოგია 10</option><option>ჰეპატოლოგია</option>
            </select>
          </div>
          <div class="form-group"><label>ტელეფონი</label><input type="tel" id="new-phone" placeholder="555 000 000" /></div>
          <button class="btn btn-accent" id="add-new-doctor" type="button">+ ექიმის დამატება</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
