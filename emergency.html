<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ემერჯენსის გასინჯვის ფურცელი</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:#fff;color:#111;font-size:14px;line-height:1.58;}

    .topbar{
      background:#fff;
      color:#111;
      padding:12px 20px 10px;
      display:flex;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      border-bottom:2.5px solid #111;
    }
    .topbar h1{font-size:1.08rem;font-weight:700;letter-spacing:.3px;color:#111;}
    .pbadge{margin-left:auto;font-size:.82rem;line-height:1.6;text-align:right;color:#111;}
    .pbadge strong{font-size:.95rem;display:block;color:#111;}

    .wrap{max-width:900px;margin:0 auto;padding:14px 20px 100px;}
    .sec{margin-bottom:14px;}
    .sec-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#111;border-bottom:1.5px solid #111;padding-bottom:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
    .sec-title .arr{font-size:.75rem;color:#888;transition:transform .2s;}
    .sec-body{margin-top:9px;}
    .sec.open .sec-title .arr{transform:rotate(180deg);}

    textarea.f{
      width:100%;
      border:1px solid #ddd;
      outline:none;
      resize:vertical;
      overflow:hidden;
      font-family:inherit;
      font-size:0.96rem;
      line-height:1.6;
      padding:8px 8px 6px;
      min-height:90px;
      background:#fafafa;
      border-radius:4px;
      transition:border-color .2s;
      white-space:pre-wrap;
      word-wrap:break-word;
      word-break:break-word;
    }
    textarea.f:focus{border-color:#111;background:#fff;}

    .print-proxy{
      display:none;
      width:100%;
      border:1px solid #555;
      font-family:inherit;
      font-size:10.5pt;
      line-height:1.55;
      padding:2mm 3mm;
      margin:2mm 0 3mm 0;
      background:#fff;
      white-space:pre-wrap;
      word-wrap:break-word;
      word-break:break-word;
      min-height:0;
    }

    .col-head{font-size:.82rem;font-weight:700;color:#444;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
    .col-badge{font-size:.75rem;background:#111;color:#fff;border-radius:3px;padding:1px 6px;font-weight:600;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .dt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
    .dt-group{display:flex;flex-direction:column;gap:4px;}
    input[type="date"],input[type="text"]{border:none;border-bottom:1px solid #ccc;outline:none;font-family:inherit;font-size:.9rem;padding:5px 3px;background:transparent;color:#111;transition:border-color .2s;min-width:140px;}
    input:focus{border-bottom-color:#111;}
    .now-btn{background:none;border:1px solid #888;border-radius:4px;padding:3px 9px;font-size:.78rem;cursor:pointer;color:#444;}
    .now-btn:hover{background:#111;color:#fff;border-color:#111;}
    .doctor-row{display:flex;align-items:center;gap:12px;margin:16px 0 10px 0;}
    .doctor-row label{font-size:0.9rem;font-weight:600;white-space:nowrap;min-width:140px;}
    .doctor-row input,.doctor-row select{flex:1;max-width:420px;border:none;border-bottom:1px solid #ccc;padding:6px 3px;font-size:0.96rem;background:transparent;font-family:inherit;color:#111;outline:none;}
    .doctor-row input:focus,.doctor-row select:focus{border-bottom-color:#111;}
    .doctor-sign{width:130px;max-width:35vw;height:auto;max-height:46px;object-fit:contain;display:none;}

    /* ── ICD inputs row ── */
    .icd-inputs{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;padding-top:8px;}

    /* ICD code field with autocomplete */
    .icd-code-wrap{position:relative;width:130px;flex-shrink:0;}
    input.ic{width:100%;border:none;border-bottom:1.5px solid #ccc;outline:none;font-family:inherit;font-size:.96rem;padding:6px 3px;background:transparent;color:#1d4ed8;font-weight:700;text-transform:uppercase;}
    input.ic:focus{border-bottom-color:#1d4ed8;}

    /* ICD name field with autocomplete */
    .icd-name-wrap{flex:1;min-width:200px;position:relative;}
    input.in{width:100%;border:none;border-bottom:1.5px solid #ccc;outline:none;font-family:inherit;font-size:.96rem;padding:6px 3px;background:transparent;}
    input.in:focus{border-bottom-color:#111;}

    /* Diagnosis type select */
    .icd-type-wrap{position:relative;width:140px;flex-shrink:0;}
    .icd-type-select{
      width:100%;
      border:none;
      border-bottom:1.5px solid #ccc;
      outline:none;
      font-family:inherit;
      font-size:.9rem;
      padding:6px 22px 6px 3px;
      background:transparent;
      color:#111;
      cursor:pointer;
      appearance:none;
      -webkit-appearance:none;
    }
    .icd-type-select:focus{border-bottom-color:#111;}
    .icd-type-arrow{
      position:absolute;
      right:4px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      color:#888;
      font-size:.75rem;
    }

    /* Shared autocomplete dropdown */
    .icd-ac-dropdown{
      position:absolute;
      top:calc(100% + 3px);
      left:0;
      right:0;
      background:#fff;
      border:1.5px solid #ddd;
      border-radius:6px;
      box-shadow:0 6px 24px rgba(0,0,0,.12);
      z-index:9999;
      max-height:260px;
      overflow-y:auto;
      display:none;
    }
    .icd-ac-dropdown.open{display:block;}
    .icd-ac-dropdown::-webkit-scrollbar{width:4px;}
    .icd-ac-dropdown::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}

    .ac-count{
      font-size:.68rem;
      color:#888;
      padding:4px 10px;
      background:#f8f9fb;
      border-bottom:1px solid #f0f0f0;
      font-family:monospace;
    }
    .ac-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:7px 10px;
      cursor:pointer;
      border-bottom:1px solid #f5f5f5;
      transition:background .1s;
    }
    .ac-item:last-child{border-bottom:none;}
    .ac-item:hover,.ac-item.active{background:#eff6ff;}
    .ac-item-code{
      font-family:monospace;
      font-size:.75rem;
      font-weight:700;
      color:#1d4ed8;
      background:#eff6ff;
      padding:2px 6px;
      border-radius:3px;
      white-space:nowrap;
      min-width:55px;
      text-align:center;
      flex-shrink:0;
    }
    .ac-item-name{
      font-size:.83rem;
      color:#111;
      line-height:1.4;
    }
    .ac-item-name mark{
      background:rgba(29,78,216,.13);
      color:#1d4ed8;
      border-radius:2px;
      padding:0 1px;
      font-style:normal;
    }
    .ac-empty{
      padding:12px 10px;
      color:#aaa;
      font-size:.83rem;
      text-align:center;
    }

    .add-btn{background:#111;color:#fff;border:none;border-radius:5px;padding:8px 16px;font-size:.84rem;cursor:pointer;font-weight:600;}
    .add-btn:hover{background:#333;}
    .diag-list{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
    .diag-item{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f0f0f0;}
    .diag-item .code{font-size:.84rem;font-weight:700;color:#1d4ed8;background:#eff6ff;border-radius:4px;padding:3px 8px;}
    .diag-item .diag-type-badge{font-size:.75rem;color:#555;background:#f3f4f6;border-radius:3px;padding:2px 7px;white-space:nowrap;}
    .diag-item .name{flex:1;font-size:.94rem;}
    .diag-item .rm{background:none;border:none;cursor:pointer;color:#ccc;font-size:1.2rem;padding:0 5px;}
    .diag-item .rm:hover{color:#dc2626;}

    .actions{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e5e7eb;padding:12px 24px;display:flex;gap:14px;justify-content:flex-end;align-items:center;z-index:50;}
    .btn-save{background:#111;color:#fff;border:none;border-radius:6px;padding:10px 28px;font-size:.96rem;font-weight:700;cursor:pointer;}
    .btn-save:hover{background:#333;}
    .btn-print{background:#fff;color:#111;border:1.5px solid #999;border-radius:6px;padding:10px 22px;font-size:.96rem;font-weight:600;cursor:pointer;}
    .btn-print:hover{background:#f9fafb;}
    .save-ok{font-size:.86rem;color:#15803d;font-weight:600;opacity:0;transition:opacity .3s;}
    .save-ok.show{opacity:1;}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 26px;border-radius:8px;font-size:.92rem;opacity:0;transition:all .3s;z-index:999;}
    .toast.show{opacity:1;}
    .toast.err{background:#dc2626;}

    @media print {
      .actions, .now-btn, .add-btn, .diag-item .rm,
      .sec-title .arr, .icd-inputs, .icd-ac-dropdown { display:none !important; }
      body { font-size:10.5pt !important; line-height:1.52 !important; }
      .topbar { border-bottom:2px solid #111 !important; padding:6mm 10mm 5mm !important; }
      .wrap { padding:6mm 10mm 10mm !important; max-width:none !important; margin:0 !important; }
      textarea.f   { display:none !important; }
      .print-proxy { display:block !important; }
      .sec { page-break-inside:auto; break-inside:auto; margin-bottom:3mm; }
      .sec-title { page-break-after:avoid; break-after:avoid-page; }
      .sec-body { margin-top:2mm; page-break-inside:auto; break-inside:auto; }
      .diag-list, .diag-item { page-break-inside:auto; break-inside:auto; }
      .diag-item .code { background:#eff6ff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .col-badge { background:#111 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      input[type="date"], input[type="text"] { border:none !important; border-bottom:1px solid #555 !important; }
      @page { size:A4 portrait; margin:12mm 10mm 14mm 10mm; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div><h1>ემერჯენსის გასინჯვის ფურცელი</h1></div>
  <div class="pbadge">
    <strong id="pb-name">—</strong>
    <span id="pb-info"></span>
  </div>
</div>

<div class="wrap">

  <div class="sec open" id="sec-patient">
    <div class="sec-title">პაციენტის მონაცემები</div>
    <div class="sec-body">
      <table style="width:100%;border-collapse:collapse;font-size:.94rem;">
        <tr>
          <td style="width:140px;color:#555;font-weight:600;padding:5px 0;">სახელი / გვარი:</td>
          <td style="padding:5px 12px;" id="inf-name">—</td>
          <td style="width:120px;color:#555;font-weight:600;padding:5px 0;">პირადი ნომ.:</td>
          <td style="padding:5px 12px;" id="inf-pid">—</td>
        </tr>
        <tr>
          <td style="color:#555;font-weight:600;padding:5px 0;">დ/თ:</td>
          <td style="padding:5px 12px;"><span id="inf-dob">—</span> <span id="inf-age" style="color:#1d4ed8;font-weight:700;"></span></td>
          <td style="color:#555;font-weight:600;padding:5px 0;">მისამართი:</td>
          <td style="padding:5px 12px;" id="inf-addr">—</td>
        </tr>
        <tr>
          <td style="color:#555;font-weight:600;padding:5px 0;">სტაციონარში:</td>
          <td style="padding:5px 12px;" id="inf-admit" colspan="3">—</td>
        </tr>
      </table>
    </div>
  </div>

  <div class="sec" id="sec-complaints">
    <div class="sec-title" onclick="toggleSec('sec-complaints')">ჩივილები <span class="arr">▼</span></div>
    <div class="sec-body">
      <textarea class="f" id="complaints" placeholder="პაციენტის ჩივილები..."></textarea>
      <div class="print-proxy" id="complaints-proxy"></div>
    </div>
  </div>

  <div class="sec" id="sec-anamnesis">
    <div class="sec-title" onclick="toggleSec('sec-anamnesis')">დაავადების ანამნეზი <span class="arr">▼</span></div>
    <div class="sec-body">
      <textarea class="f" id="anamnesis" placeholder="დაავადების ანამნეზი..."></textarea>
      <div class="print-proxy" id="anamnesis-proxy"></div>
    </div>
  </div>

  <div class="sec" id="sec-status">
    <div class="sec-title" onclick="toggleSec('sec-status')">ობიექტური გასინჯვა — Status localis <span class="arr">▼</span></div>
    <div class="sec-body">
      <div>
        <div class="col-head"><span class="col-badge">შემოსვლა</span></div>
        <div class="dt-row">
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">თარიღი</label>
            <input type="date" id="admit-date"/>
          </div>
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">დრო</label>
            <input type="text" id="admit-time" placeholder="მაგ: 14:30"/>
          </div>
        </div>
        <textarea class="f" id="st-adm" placeholder="შემოსვლის დროს მონაცემები..."></textarea>
        <div class="print-proxy" id="st-adm-proxy"></div>
        <div class="doctor-row">
          <label>ექიმი:</label>
          <select id="doctor-adm">
            <option value="">აირჩიეთ ექიმი</option>
            <option value="ნინო კიკვაძე">ნინო კიკვაძე</option>
            <option value="ანა დალაქიშვილი">ანა დალაქიშვილი</option>
            <option value="ეკატერინე მიქელაძე">ეკატერინე მიქელაძე</option>
            <option value="მურადი მიგინეიშვილი">მურადი მიგინეიშვილი</option>
            <option value="მარიამ კვერნაძე">მარიამ კვერნაძე</option>
            <option value="ქეთევან ზედელაშვილი">ქეთევან ზედელაშვილი</option>
            <option value="თეკლა მაისურაძე">თეკლა მაისურაძე</option>
          </select>
          <img class="doctor-sign" id="doctor-adm-sign" alt="ექიმის ხელმოწერა"/>
        </div>
      </div>

      <div style="margin-top:32px;">
        <div class="col-head"><span class="col-badge">გადაყვანა</span></div>
        <div class="dt-row">
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">თარიღი</label>
            <input type="date" id="tr-date"/>
          </div>
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">დრო</label>
            <input type="text" id="tr-time" placeholder="მაგ: 14:30"/>
          </div>
          <button class="now-btn" onclick="setNow('tr-time')">ახლა</button>
        </div>
        <textarea class="f" id="st-tr" placeholder="გადაყვანის დროს მონაცემები..."></textarea>
        <div class="print-proxy" id="st-tr-proxy"></div>
        <div class="doctor-row">
          <label>ექიმი:</label>
          <select id="doctor-tr">
            <option value="">აირჩიეთ ექიმი</option>
            <option value="ნინო კიკვაძე">ნინო კიკვაძე</option>
            <option value="ანა დალაქიშვილი">ანა დალაქიშვილი</option>
            <option value="ეკატერინე მიქელაძე">ეკატერინე მიქელაძე</option>
            <option value="მურადი მიგინეიშვილი">მურადი მიგინეიშვილი</option>
            <option value="მარიამ კვერნაძე">მარიამ კვერნაძე</option>
            <option value="ქეთევან ზედელაშვილი">ქეთევან ზედელაშვილი</option>
            <option value="თეკლა მაისურაძე">თეკლა მაისურაძე</option>
          </select>
          <img class="doctor-sign" id="doctor-tr-sign" alt="ექიმის ხელმოწერა"/>
        </div>
      </div>
    </div>
  </div>

  <div class="sec" id="sec-diag">
    <div class="sec-title" onclick="toggleSec('sec-diag')">დიაგნოზი — Diagnosis (ICD-10) <span class="arr">▼</span></div>
    <div class="sec-body">
      <div class="icd-inputs">

        <!-- კოდი (autocomplete) -->
        <div class="icd-code-wrap">
          <input type="text" class="ic" id="diag-code" placeholder="კოდი" maxlength="12" autocomplete="off"/>
          <div class="icd-ac-dropdown" id="ac-code"></div>
        </div>

        <!-- დასახელება (autocomplete) -->
        <div class="icd-name-wrap">
          <input type="text" class="in" id="diag-name" placeholder="დასახელება ან ძებნა..." autocomplete="off"/>
          <div class="icd-ac-dropdown" id="ac-name"></div>
        </div>

        <!-- სახეობა -->
        <div class="icd-type-wrap">
          <select class="icd-type-select" id="diag-type">
            <option value="">— სახეობა —</option>
            <option value="მწვავე">მწვავე</option>
            <option value="თანმხლები">თანმხლები</option>
            <option value="ქრონიკული">ქრონიკული</option>
            <option value="ქვემწვავე">ქვემწვავე</option>
            <option value="გართულება">გართულება</option>
          </select>
          <span class="icd-type-arrow">▾</span>
        </div>

        <button class="add-btn" onclick="addDiag()">+ დამატება</button>
      </div>
      <div class="diag-list" id="diag-list"></div>
    </div>
  </div>

  <div class="sec" id="sec-treating-doctor">
    <div class="sec-title">მკურნალი ექიმი</div>
    <div class="sec-body">
      <div class="doctor-row" style="margin-top:6px;">
        <label>სახელი გვარი:</label>
        <select id="doctor-main">
          <option value="">აირჩიეთ ექიმი</option>
          <option value="ნინო კიკვაძე">ნინო კიკვაძე</option>
          <option value="ანა დალაქიშვილი">ანა დალაქიშვილი</option>
          <option value="ეკატერინე მიქელაძე">ეკატერინე მიქელაძე</option>
          <option value="მურადი მიგინეიშვილი">მურადი მიგინეიშვილი</option>
          <option value="მარიამ კვერნაძე">მარიამ კვერნაძე</option>
          <option value="ქეთევან ზედელაშვილი">ქეთევან ზედელაშვილი</option>
          <option value="თეკლა მაისურაძე">თეკლა მაისურაძე</option>
        </select>
        <img class="doctor-sign" id="doctor-main-sign" alt="ექიმის ხელმოწერა"/>
      </div>
    </div>
  </div>

</div>

<div class="actions">
  <span class="save-ok" id="save-ok">✓ შენახულია</span>
  <button class="btn-print" onclick="window.print()">🖨 ბეჭდვა</button>
  <button class="btn-save">შენახვა</button>
</div>

<div class="toast" id="toast"></div>

<script src="icd10.js"></script>

<script>
/* ══════════════════════════════════════════════
   ICD-10 AUTOCOMPLETE — standalone (არ module)
   ICD10_KA = { "A00": "ქოლერა", ... }
══════════════════════════════════════════════ */
(function(){
  const MAX = 60;
  let acEntries = [];
  let codeFiltered = [], nameFiltered = [];
  let codeIdx = -1, nameIdx = -1;

  // icd10.js ჩატვირთვის შემდეგ entries ავაწყობთ
  function ensureEntries(){
    if (acEntries.length) return;
    const src = (typeof ICD10_KA !== 'undefined' && ICD10_KA)
             || (typeof icd10Data !== 'undefined' && icd10Data)
             || (typeof icd10 !== 'undefined' && icd10)
             || null;
    if (!src) return;
    acEntries = Object.entries(src).map(([code, name]) => ({ code, name }));
  }

  function search(q){
    ensureEntries();
    const uq = q.toUpperCase();
    const res = [];
    for (const e of acEntries){
      if (e.code.toUpperCase().includes(uq) || e.name.toUpperCase().includes(uq)){
        res.push(e);
        if (res.length >= MAX) break;
      }
    }
    return res;
  }

  function hl(text, q){
    if (!q) return text;
    try {
      return text.replace(
        new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'),
        '<mark>$1</mark>'
      );
    } catch(e){ return text; }
  }

  function buildDD(items, q, ddEl, onPick){
    if (!items.length){
      ddEl.innerHTML = '<div class="ac-empty">შედეგი ვერ მოიძებნა</div>';
    } else {
      ddEl.innerHTML =
        '<div class="ac-count">' + items.length + ' შედეგი' + (items.length===MAX?' (მაქს.)':'') + '</div>' +
        items.map((it, i) =>
          '<div class="ac-item" data-i="'+i+'">' +
            '<span class="ac-item-code">' + hl(it.code, q) + '</span>' +
            '<span class="ac-item-name">' + hl(it.name, q) + '</span>' +
          '</div>'
        ).join('');
      ddEl.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('mousedown', ev => {
          ev.preventDefault();
          onPick(parseInt(el.dataset.i));
        });
      });
    }
    ddEl.classList.add('open');
  }

  function closeDD(ddEl){ ddEl.classList.remove('open'); ddEl.innerHTML = ''; }

  function setActiveDD(ddEl, idx){
    ddEl.querySelectorAll('.ac-item').forEach((el,i) => el.classList.toggle('active', i===idx));
    const act = ddEl.querySelector('.ac-item.active');
    if (act) act.scrollIntoView({block:'nearest'});
  }

  // ── CODE input ──
  const codeInp = document.getElementById('diag-code');
  const nameInp = document.getElementById('diag-name');
  const acCode  = document.getElementById('ac-code');
  const acName  = document.getElementById('ac-name');

  codeInp.addEventListener('input', function(){
    const v = this.value.trim();
    codeIdx = -1;
    if (!v){ closeDD(acCode); return; }
    codeFiltered = search(v);
    buildDD(codeFiltered, v, acCode, function(i){
      const it = codeFiltered[i];
      if (!it) return;
      codeInp.value = it.code;
      nameInp.value = it.name;
      closeDD(acCode);
      closeDD(acName);
    });
  });

  codeInp.addEventListener('keydown', function(e){
    const items = acCode.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key==='ArrowDown'){ e.preventDefault(); codeIdx=Math.min(codeIdx+1,items.length-1); setActiveDD(acCode,codeIdx); }
    else if (e.key==='ArrowUp'){ e.preventDefault(); codeIdx=Math.max(codeIdx-1,0); setActiveDD(acCode,codeIdx); }
    else if (e.key==='Enter'){
      e.preventDefault();
      const idx = codeIdx>=0 ? codeIdx : (codeFiltered.length===1 ? 0 : -1);
      if (idx>=0){ const it=codeFiltered[idx]; codeInp.value=it.code; nameInp.value=it.name; closeDD(acCode); }
    }
    else if (e.key==='Escape') closeDD(acCode);
  });

  codeInp.addEventListener('blur', () => setTimeout(()=>closeDD(acCode), 160));
  codeInp.addEventListener('focus', function(){
    if (this.value.trim()){ codeFiltered=search(this.value.trim()); buildDD(codeFiltered,this.value.trim(),acCode,function(i){ const it=codeFiltered[i]; if(it){codeInp.value=it.code;nameInp.value=it.name;closeDD(acCode);} }); }
  });

  // ── NAME input ──
  nameInp.addEventListener('input', function(){
    const v = this.value.trim();
    nameIdx = -1;
    // თუ code ველი სავსეა — არ ვიძებნოთ სახელით dropdown
    if (codeInp.value.trim()){ closeDD(acName); return; }
    if (!v){ closeDD(acName); return; }
    nameFiltered = search(v);
    buildDD(nameFiltered, v, acName, function(i){
      const it = nameFiltered[i];
      if (!it) return;
      codeInp.value = it.code;
      nameInp.value = it.name;
      closeDD(acName);
    });
  });

  nameInp.addEventListener('keydown', function(e){
    const items = acName.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key==='ArrowDown'){ e.preventDefault(); nameIdx=Math.min(nameIdx+1,items.length-1); setActiveDD(acName,nameIdx); }
    else if (e.key==='ArrowUp'){ e.preventDefault(); nameIdx=Math.max(nameIdx-1,0); setActiveDD(acName,nameIdx); }
    else if (e.key==='Enter'){
      e.preventDefault();
      const idx = nameIdx>=0 ? nameIdx : (nameFiltered.length===1 ? 0 : -1);
      if (idx>=0){ const it=nameFiltered[idx]; codeInp.value=it.code; nameInp.value=it.name; closeDD(acName); }
    }
    else if (e.key==='Escape') closeDD(acName);
  });

  nameInp.addEventListener('blur', () => setTimeout(()=>closeDD(acName), 160));

  window._icdGetName = function(code){
    ensureEntries();
    if (!code) return '';
    const u = code.trim().toUpperCase();
    const found = acEntries.find(e => e.code.toUpperCase() === u);
    return found ? found.name : '';
  };
})();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, doc, setDoc, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDze1tz15HdKZVSPOPW_-7t-9ag4AiZYs",
    authDomain: "clinic-inpatient.firebaseapp.com",
    projectId: "clinic-inpatient",
    storageBucket: "clinic-inpatient.firebasestorage.app",
    messagingSenderId: "586729386322",
    appId: "1:586729386322:web:17a92324784c2c988a4a8b"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params  = new URLSearchParams(location.search);
  const pid     = params.get('pid') || '';
  const room    = params.get('room') || '';
  const name    = decodeURIComponent(params.get('name') || '');
  const bed     = decodeURIComponent(params.get('bed') || '');
  const history = decodeURIComponent(params.get('history') || '');
  const pidNum  = decodeURIComponent(params.get('personal_id') || '');
  const dob     = decodeURIComponent(params.get('dob') || '');
  const address = decodeURIComponent(params.get('address') || '');
  const admitDt = decodeURIComponent(params.get('admit_dt') || '');
  const doctor  = decodeURIComponent(params.get('doctor') || '');
  const docId   = pid && room ? `${room}_${pid}` : null;

  document.getElementById('pb-name').textContent = name || 'პაციენტი';
  const infParts = [];
  if (bed)     infParts.push(`საწ. ${bed}`);
  if (history) infParts.push(`ისტ. ${history}`);
  if (room)    infParts.push(room);
  document.getElementById('pb-info').textContent = infParts.join(' · ');

  document.getElementById('inf-name').textContent = name    || '—';
  document.getElementById('inf-pid').textContent  = pidNum  || '—';
  document.getElementById('inf-dob').textContent  = dob     || '—';
  document.getElementById('inf-addr').textContent = address || '—';

  if (dob) {
    const age = calcAge(dob);
    if (age) document.getElementById('inf-age').textContent = `(${age})`;
  }

  function calcAge(dStr) {
    if (!dStr) return '';
    const d = new Date(dStr);
    if (isNaN(d)) return '';
    let age = new Date().getFullYear() - d.getFullYear();
    const m = new Date().getMonth() - d.getMonth();
    if (m < 0 || (m === 0 && new Date().getDate() < d.getDate())) age--;
    return age >= 0 ? age + ' წ.' : '';
  }

  function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  function showToast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (err ? ' err' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = (el.scrollHeight + 4) + 'px';
  }

  function syncProxy(ta) {
    const proxy = document.getElementById(ta.id + '-proxy');
    if (proxy) proxy.textContent = ta.value;
  }

  function syncAllProxies() {
    document.querySelectorAll('textarea.f').forEach(syncProxy);
  }

  function ensureDoctorOption(selectEl, value) {
    if (!selectEl || !value) return;
    const exists = Array.from(selectEl.options).some(o => o.value === value);
    if (!exists) {
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = value;
      selectEl.appendChild(opt);
    }
  }

  function updateDoctorSignature(selectId) {
    const sel = document.getElementById(selectId);
    const img = document.getElementById(selectId + '-sign');
    if (!sel || !img) return;
    const val = (sel.value || '').trim();
    if (!val) {
      img.style.display = 'none';
      img.removeAttribute('src');
      return;
    }
    img.onload = () => { img.style.display = 'block'; };
    img.onerror = () => {
      img.style.display = 'none';
      img.removeAttribute('src');
    };
    img.alt = `${val} ხელმოწერა`;
    img.src = `${encodeURIComponent(val)}.png`;
  }

  function setDoctorValue(selectId, value) {
    const sel = document.getElementById(selectId);
    if (!sel) return;
    const nextValue = (value || '').trim();
    ensureDoctorOption(sel, nextValue);
    sel.value = nextValue;
    updateDoctorSignature(selectId);
  }

  document.querySelectorAll('textarea.f').forEach(ta => {
    ta.addEventListener('input', () => { autoResize(ta); syncProxy(ta); });
    autoResize(ta);
  });
  ['doctor-adm', 'doctor-tr', 'doctor-main'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', () => updateDoctorSignature(id));
  });
  setDoctorValue('doctor-main', doctor);
  updateDoctorSignature('doctor-adm');
  updateDoctorSignature('doctor-tr');

  window.toggleSec = function(id) {
    document.getElementById(id).classList.toggle('open');
  };

  let diagnoses = [];

  function renderDiags() {
    const list = document.getElementById('diag-list');
    list.innerHTML = diagnoses.map((d, i) => `
      <div class="diag-item">
        ${d.code ? `<span class="code">${esc(d.code)}</span>` : ''}
        <span class="name">${esc(d.name)}</span>
        ${d.type ? `<span class="diag-type-badge">${esc(d.type)}</span>` : ''}
        <button class="rm" onclick="rmDiag(${i})">×</button>
      </div>
    `).join('');
    if (diagnoses.length) document.getElementById('sec-diag').classList.add('open');
  }

  window.rmDiag = i => {
    diagnoses.splice(i, 1);
    renderDiags();
    saveData();
  };

  window.addDiag = () => {
    const code  = document.getElementById('diag-code').value.trim().toUpperCase();
    const dtype = document.getElementById('diag-type').value;
    let dname   = document.getElementById('diag-name').value.trim();

    // თუ სახელი ცარიელია — icd10.js-იდან ვეძებთ
    if (!dname && code) {
      dname = (typeof window._icdGetName === 'function') ? window._icdGetName(code) : '';
    }

    if (!code && !dname) { showToast('შეიყვანეთ კოდი ან დასახელება', true); return; }

    diagnoses.push({ code, name: dname, type: dtype });
    renderDiags();
    document.getElementById('diag-code').value = '';
    document.getElementById('diag-name').value = '';
    document.getElementById('diag-type').value = '';
    saveData();
  };

  async function saveData() {
    syncAllProxies();
    if (!docId) { showToast('არ არის PID ან ROOM — მონაცემები არ შეინახება', true); return; }

    const admitFull = document.getElementById('admit-date').value && document.getElementById('admit-time').value
      ? `${document.getElementById('admit-date').value}T${document.getElementById('admit-time').value}` : '';

    const data = {
      pid, room, patientName: name, bed, history, personalId: pidNum, dob, address,
      admitDt: admitFull,
      complaints:  document.getElementById('complaints').value.trim(),
      anamnesis:   document.getElementById('anamnesis').value.trim(),
      dtAdmDate:   document.getElementById('admit-date').value,
      dtAdmTime:   document.getElementById('admit-time').value,
      stAdm:       document.getElementById('st-adm').value.trim(),
      doctorAdm:   document.getElementById('doctor-adm').value.trim(),
      dtTrDate:    document.getElementById('tr-date').value,
      dtTrTime:    document.getElementById('tr-time').value,
      stTr:        document.getElementById('st-tr').value.trim(),
      doctorTr:    document.getElementById('doctor-tr').value.trim(),
      doctorMain:  document.getElementById('doctor-main').value.trim(),
      diagnoses,
      updatedAt:   serverTimestamp()
    };

    try {
      await setDoc(doc(db, 'emergency_sheets', docId), data, { merge: true });
      document.getElementById('save-ok').classList.add('show');
      setTimeout(() => document.getElementById('save-ok').classList.remove('show'), 2500);
    } catch (err) {
      showToast('შეცდომა შენახვისას: ' + err.message, true);
    }
  }

  if (docId) {
    onSnapshot(doc(db, 'emergency_sheets', docId), (snap) => {
      if (!snap.exists()) return;
      const d = snap.data();
      document.getElementById('complaints').value  = d.complaints || '';
      document.getElementById('anamnesis').value   = d.anamnesis  || '';
      document.getElementById('admit-date').value  = d.dtAdmDate  || (admitDt ? admitDt.split('T')[0] : '');
      document.getElementById('admit-time').value  = d.dtAdmTime  || (admitDt ? admitDt.split('T')[1]?.slice(0,5) : '');
      document.getElementById('st-adm').value      = d.stAdm      || '';
      setDoctorValue('doctor-adm', d.doctorAdm || '');
      document.getElementById('tr-date').value     = d.dtTrDate   || '';
      document.getElementById('tr-time').value     = d.dtTrTime   || '';
      document.getElementById('st-tr').value       = d.stTr       || '';
      setDoctorValue('doctor-tr', d.doctorTr || '');
      setDoctorValue('doctor-main', d.doctorMain || doctor || '');
      if (Array.isArray(d.diagnoses)) { diagnoses = d.diagnoses; renderDiags(); }
      document.querySelectorAll('textarea.f').forEach(ta => { autoResize(ta); syncProxy(ta); });
    });
  }

  document.querySelector('.btn-save').onclick = saveData;

  window.setNow = function(id) {
    const now = new Date();
    document.getElementById(id).value =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  };

  window.addEventListener('beforeprint', syncAllProxies);
</script>

</body>
