<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICD-10 ავტოშევსება</title>
<link href="https://fonts.googleapis.com/css2?family=FiraGO:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --white: #ffffff;
    --border: #dde1ee;
    --border-focus: #3b5bdb;
    --text: #1a1d2e;
    --muted: #8b92a9;
    --accent: #3b5bdb;
    --accent-bg: #eef1fd;
    --tag-bg: #e8f0fe;
    --shadow: 0 4px 24px rgba(30,40,80,0.10);
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    font-family: 'FiraGO', 'Segoe UI', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 2rem;
    width: 100%;
    max-width: 700px;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .card-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .field { flex: 1; position: relative; }

  .field-label {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    display: block;
  }

  .input-wrap {
    display: flex;
    align-items: center;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color 0.15s, box-shadow 0.15s;
    min-height: 40px;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,91,219,0.10);
  }

  .icd-prefix {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 0 0.65rem;
    min-height: 40px;
    display: flex;
    align-items: center;
    border-right: 1.5px solid var(--border);
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    white-space: nowrap;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  #icd-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
    padding: 0.55rem 0.65rem;
    text-transform: uppercase;
    background: transparent;
    min-width: 0;
  }

  #icd-input::placeholder {
    font-family: 'FiraGO', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--muted);
    text-transform: none;
    letter-spacing: 0;
  }

  .clear-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 0 0.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .clear-btn.show { opacity: 1; pointer-events: all; }
  .clear-btn:hover { color: #e53935; }

  /* Type select */
  .type-field { min-width: 155px; }

  .custom-select { position: relative; }

  .select-btn {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 2rem 0 0.75rem;
    background: var(--white);
    font-family: 'FiraGO', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    outline: none;
    min-height: 40px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .select-btn.open,
  .select-btn:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,91,219,0.10);
  }

  .select-arrow {
    position: absolute;
    right: 0.55rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    transition: transform 0.18s;
  }

  .select-arrow.open { transform: translateY(-50%) rotate(180deg); }

  .select-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    z-index: 200;
    overflow: hidden;
    display: none;
  }

  .select-dropdown.open { display: block; }

  .select-option {
    padding: 0.55rem 0.75rem;
    font-size: 0.84rem;
    cursor: pointer;
    transition: background 0.1s;
    color: var(--text);
  }

  .select-option:hover { background: var(--accent-bg); }
  .select-option.selected { color: var(--accent); font-weight: 600; background: var(--accent-bg); }

  /* ICD Dropdown */
  .icd-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    z-index: 100;
    display: none;
    max-height: 280px;
    overflow-y: auto;
  }

  .icd-dropdown.open { display: block; }
  .icd-dropdown::-webkit-scrollbar { width: 4px; }
  .icd-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dd-count {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0.3rem 0.75rem;
    background: #f8f9fe;
    border-bottom: 1px solid #f0f2f8;
    font-family: 'IBM Plex Mono', monospace;
  }

  .dd-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    cursor: pointer;
    border-bottom: 1px solid #f0f2f8;
    transition: background 0.1s;
  }

  .dd-item:last-child { border-bottom: none; }
  .dd-item:hover, .dd-item.active { background: var(--accent-bg); }

  .dd-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.74rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    white-space: nowrap;
    min-width: 58px;
    text-align: center;
    flex-shrink: 0;
  }

  .dd-name {
    font-size: 0.83rem;
    color: var(--text);
    line-height: 1.4;
  }

  .dd-name mark {
    background: rgba(59,91,219,0.15);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
    font-style: normal;
  }

  .dd-empty {
    padding: 1rem 0.75rem;
    color: var(--muted);
    font-size: 0.83rem;
    text-align: center;
  }

  /* Result */
  .result {
    margin-top: 1.1rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    display: none;
    background: #fafbff;
    gap: 0.75rem;
    animation: fadeUp 0.18s ease;
  }

  .result.show { display: flex; align-items: flex-start; flex-wrap: wrap; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-code-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 0.25rem 0.6rem;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .result-body { flex: 1; min-width: 0; }

  .result-name {
    font-size: 0.88rem;
    font-weight: 500;
    line-height: 1.5;
  }

  .result-type {
    margin-top: 0.3rem;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .result-type-val {
    color: var(--accent);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">ICD-10 დიაგნოზი</div>
  <div class="card-sub">ჩაწერეთ კოდი ან სახელი — დიაგნოზი შეივსება ავტომატურად</div>

  <div class="row">
    <!-- ICD Code Field -->
    <div class="field" id="icd-field">
      <label class="field-label" for="icd-input">კოდი / დიაგნოზი</label>
      <div class="input-wrap">
        <span class="icd-prefix">ICD-10</span>
        <input id="icd-input" type="text" placeholder="მაგ: R10.4 ან მუცლის ტკივილი..." autocomplete="off" spellcheck="false">
        <button class="clear-btn" id="clear-btn" type="button" title="გასუფთავება">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="icd-dropdown" id="icd-dropdown"></div>
    </div>

    <!-- Diagnosis Type -->
    <div class="field type-field">
      <label class="field-label">სახეობა</label>
      <div class="custom-select" id="type-select">
        <button class="select-btn" id="type-btn" type="button">— აირჩიეთ —</button>
        <svg class="select-arrow" id="type-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        <div class="select-dropdown" id="type-dropdown">
          <div class="select-option" data-value="">— აირჩიეთ —</div>
          <div class="select-option" data-value="მწვავე">მწვავე</div>
          <div class="select-option" data-value="თანმხლები">თანმხლები</div>
          <div class="select-option" data-value="ქრონიკული">ქრონიკული</div>
          <div class="select-option" data-value="ქვემწვავე">ქვემწვავე</div>
          <div class="select-option" data-value="გართულება">გართულება</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Result panel -->
  <div class="result" id="result-panel">
    <div class="result-code-badge" id="res-code"></div>
    <div class="result-body">
      <div class="result-name" id="res-name"></div>
      <div class="result-type" id="res-type"></div>
    </div>
  </div>
</div>

<!-- icd10.js must be in the same directory -->
<script src="icd10.js"></script>
<script>
(function () {
  let selectedCode = null;
  let selectedName = null;
  let selectedType = '';
  let activeIdx = -1;
  let filteredItems = [];
  const MAX = 60;

  const input      = document.getElementById('icd-input');
  const dropdown   = document.getElementById('icd-dropdown');
  const clearBtn   = document.getElementById('clear-btn');
  const resultPanel= document.getElementById('result-panel');
  const resCode    = document.getElementById('res-code');
  const resName    = document.getElementById('res-name');
  const resType    = document.getElementById('res-type');
  const typeBtn    = document.getElementById('type-btn');
  const typeArrow  = document.getElementById('type-arrow');
  const typeDropdown = document.getElementById('type-dropdown');

  // Build array from ICD10_KA object
  const entries = Object.entries(ICD10_KA).map(([code, name]) => ({ code, name }));

  function search(q) {
    const uq = q.toUpperCase();
    const res = [];
    for (const e of entries) {
      if (e.code.toUpperCase().includes(uq) || e.name.includes(q) || e.name.toUpperCase().includes(uq)) {
        res.push(e);
        if (res.length >= MAX) break;
      }
    }
    return res;
  }

  function hl(text, q) {
    if (!q) return text;
    try {
      return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
    } catch { return text; }
  }

  function renderDD(q) {
    filteredItems = search(q);
    activeIdx = -1;

    if (!filteredItems.length) {
      dropdown.innerHTML = '<div class="dd-empty">შედეგი ვერ მოიძებნა</div>';
    } else {
      dropdown.innerHTML =
        `<div class="dd-count">${filteredItems.length} შედეგი${filteredItems.length === MAX ? ' (მაქსიმუმი)' : ''}</div>` +
        filteredItems.map((item, i) =>
          `<div class="dd-item" data-i="${i}">
            <span class="dd-code">${hl(item.code, q)}</span>
            <span class="dd-name">${hl(item.name, q)}</span>
          </div>`
        ).join('');

      dropdown.querySelectorAll('.dd-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          pick(+el.dataset.i);
        });
      });
    }
    dropdown.classList.add('open');
  }

  function closeDD() {
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
    activeIdx = -1;
  }

  function pick(idx) {
    const item = filteredItems[idx];
    if (!item) return;
    selectedCode = item.code;
    selectedName = item.name;
    input.value = item.code;
    clearBtn.classList.add('show');
    closeDD();
    updateResult();
  }

  function updateResult() {
    if (!selectedCode) { resultPanel.classList.remove('show'); return; }
    resCode.textContent = selectedCode;
    resName.textContent = selectedName;
    resType.innerHTML = selectedType
      ? `სახეობა: <span class="result-type-val">${selectedType}</span>`
      : '';
    resultPanel.classList.add('show');
  }

  // Input
  input.addEventListener('input', () => {
    const v = input.value.trim();
    clearBtn.classList.toggle('show', v.length > 0);
    selectedCode = null; selectedName = null;
    resultPanel.classList.remove('show');
    v ? renderDD(v) : closeDD();
  });

  input.addEventListener('focus', () => { if (input.value.trim()) renderDD(input.value.trim()); });
  input.addEventListener('blur', () => setTimeout(closeDD, 160));

  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.dd-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); setActive(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); setActive(items); }
    else if (e.key === 'Enter') { e.preventDefault(); if (activeIdx >= 0) pick(activeIdx); else if (filteredItems.length===1) pick(0); }
    else if (e.key === 'Escape') closeDD();
  });

  function setActive(items) {
    items.forEach((el,i) => el.classList.toggle('active', i===activeIdx));
    if (activeIdx>=0) items[activeIdx].scrollIntoView({block:'nearest'});
  }

  clearBtn.addEventListener('click', () => {
    input.value=''; selectedCode=null; selectedName=null;
    clearBtn.classList.remove('show');
    resultPanel.classList.remove('show');
    closeDD(); input.focus();
  });

  // Type select
  typeBtn.addEventListener('click', () => {
    const open = typeDropdown.classList.toggle('open');
    typeBtn.classList.toggle('open', open);
    typeArrow.classList.toggle('open', open);
  });

  typeDropdown.querySelectorAll('.select-option').forEach(opt => {
    opt.addEventListener('click', () => {
      selectedType = opt.dataset.value;
      typeBtn.textContent = opt.textContent;
      typeDropdown.querySelectorAll('.select-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      typeDropdown.classList.remove('open');
      typeBtn.classList.remove('open');
      typeArrow.classList.remove('open');
      updateResult();
    });
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('type-select').contains(e.target)) {
      typeDropdown.classList.remove('open');
      typeBtn.classList.remove('open');
      typeArrow.classList.remove('open');
    }
  });
})();
</script>
</body>
</html>
