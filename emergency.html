<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ემერჯენსის გასინჯვის ფურცელი</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="icd10.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      setDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDze1tz15HdKZVSPOPW_-7t-9ag4AiZYs",
      authDomain: "clinic-inpatient.firebaseapp.com",
      projectId: "clinic-inpatient",
      storageBucket: "clinic-inpatient.firebasestorage.app",
      messagingSenderId: "586729386322",
      appId: "1:586729386322:web:17a92324784c2c988a4a8b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // URL პარამეტრები
    const params = new URLSearchParams(location.search);
    const pid = params.get('pid') || '';
    const room = params.get('room') || '';
    const name = decodeURIComponent(params.get('name') || '');
    const bed = decodeURIComponent(params.get('bed') || '');
    const history = decodeURIComponent(params.get('history') || '');
    const pidNum = decodeURIComponent(params.get('personal_id') || '');
    const dob = decodeURIComponent(params.get('dob') || '');
    const address = decodeURIComponent(params.get('address') || '');
    const admitDt = decodeURIComponent(params.get('admit_dt') || '');
    const doctor = decodeURIComponent(params.get('doctor') || '');

    const docId = pid && room ? `${room}_${pid}` : null;

    // UI შევსება
    document.getElementById('pb-name').textContent = name || 'პაციენტი';
    const infParts = [];
    if (bed) infParts.push(`საწ. ${bed}`);
    if (history) infParts.push(`ისტ. ${history}`);
    if (room) infParts.push(room);
    document.getElementById('pb-info').textContent = infParts.join(' · ');

    document.getElementById('inf-name').textContent = name || '—';
    document.getElementById('inf-pid').textContent = pidNum || '—';
    document.getElementById('inf-dob').textContent = dob || '—';
    document.getElementById('inf-addr').textContent = address || '—';

    if (dob) {
      const age = calcAge(dob);
      if (age) document.getElementById('inf-age').textContent = `(${age})`;
    }

    let admitDate = '';
    let admitTime = '';
    if (admitDt) {
      const parts = admitDt.split('T');
      admitDate = parts[0] || '';
      admitTime = parts[1] ? parts[1].slice(0,5) : '';
    }
    document.getElementById('admit-date').value = admitDate;
    document.getElementById('admit-time').value = admitTime;
    document.getElementById('inf-admit').textContent = admitDt ? admitDt.replace('T', ' ') : '—';

    function pad(n) { return n.toString().padStart(2, '0'); }

    function calcAge(dStr) {
      if (!dStr) return '';
      const d = new Date(dStr);
      if (isNaN(d)) return '';
      let age = new Date().getFullYear() - d.getFullYear();
      const m = new Date().getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && new Date().getDate() < d.getDate())) age--;
      return age >= 0 ? age + ' წ.' : '';
    }

    function esc(t) {
      if (!t) return '';
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    function showToast(msg, err = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (err ? ' err' : '');
      setTimeout(() => t.className = 'toast', 3000);
    }

    function autoResize(el) {
      el.style.height = '1px';
      el.style.height = (el.scrollHeight + 4) + 'px';
    }

    document.querySelectorAll('textarea.f').forEach(ta => {
      ta.addEventListener('input', () => autoResize(ta));
      autoResize(ta);
    });

    window.toggleSec = function(id) {
      document.getElementById(id).classList.toggle('open');
    };

    let diagnoses = [];

    function renderDiags() {
      const list = document.getElementById('diag-list');
      list.innerHTML = diagnoses.map((d, i) => `
        <div class="diag-item">
          ${d.code ? `<span class="code">${esc(d.code)}</span>` : ''}
          <span class="name">${esc(d.name)}</span>
          <button class="rm" onclick="rmDiag(${i})">×</button>
        </div>
      `).join('');
      if (diagnoses.length) document.getElementById('sec-diag').classList.add('open');
    }

    window.rmDiag = i => {
      diagnoses.splice(i, 1);
      renderDiags();
      saveData();
    };

    window.addDiag = () => {
      const code = document.getElementById('diag-code').value.trim().toUpperCase();
      let name = document.getElementById('diag-name').value.trim();

      if (!name && code && typeof icd10Data !== 'undefined' && icd10Data[code]) {
        name = icd10Data[code];
      }

      if (!code && !name) {
        showToast('შეიყვანეთ კოდი ან დასახელება', true);
        return;
      }

      diagnoses.push({ code, name });
      renderDiags();
      document.getElementById('diag-code').value = '';
      document.getElementById('diag-name').value = '';
      saveData();
    };

    document.getElementById('diag-code').addEventListener('input', function() {
      const code = this.value.trim().toUpperCase();
      const nameInput = document.getElementById('diag-name');
      if (code.length >= 3 && typeof icd10Data !== 'undefined' && icd10Data[code]) {
        nameInput.value = icd10Data[code];
        autoResize(nameInput);
      }
    });

    async function saveData() {
      if (!docId) {
        showToast('არ არის PID ან ROOM — მონაცემები არ შეინახება', true);
        return;
      }

      const admitFull = document.getElementById('admit-date').value && document.getElementById('admit-time').value
        ? `${document.getElementById('admit-date').value}T${document.getElementById('admit-time').value}`
        : '';

      const data = {
        pid, room, patientName: name, bed, history, personalId: pidNum, dob, address,
        admitDt: admitFull,
        complaints: document.getElementById('complaints').value.trim(),
        anamnesis: document.getElementById('anamnesis').value.trim(),
        dtAdmDate: document.getElementById('admit-date').value,
        dtAdmTime: document.getElementById('admit-time').value,
        stAdm: document.getElementById('st-adm').value.trim(),
        doctorAdm: document.getElementById('doctor-adm').value.trim(),
        dtTrDate: document.getElementById('tr-date').value,
        dtTrTime: document.getElementById('tr-time').value,
        stTr: document.getElementById('st-tr').value.trim(),
        doctorTr: document.getElementById('doctor-tr').value.trim(),
        doctorMain: document.getElementById('doctor-main').value.trim(),
        diagnoses,
        updatedAt: serverTimestamp()
      };

      try {
        await setDoc(doc(db, 'emergency_sheets', docId), data, { merge: true });
        document.getElementById('save-ok').classList.add('show');
        setTimeout(() => document.getElementById('save-ok').classList.remove('show'), 2500);
      } catch (err) {
        showToast('შეცდომა შენახვისას: ' + err.message, true);
      }
    }

    if (docId) {
      onSnapshot(doc(db, 'emergency_sheets', docId), (snap) => {
        if (!snap.exists()) return;
        const d = snap.data();

        document.getElementById('complaints').value = d.complaints || '';
        document.getElementById('anamnesis').value = d.anamnesis || '';

        document.getElementById('admit-date').value = d.dtAdmDate || (admitDt ? admitDt.split('T')[0] : '');
        document.getElementById('admit-time').value = d.dtAdmTime || (admitDt ? admitDt.split('T')[1]?.slice(0,5) : '');

        document.getElementById('st-adm').value = d.stAdm || '';
        document.getElementById('doctor-adm').value = d.doctorAdm || '';

        document.getElementById('tr-date').value = d.dtTrDate || '';
        document.getElementById('tr-time').value = d.dtTrTime || '';

        document.getElementById('st-tr').value = d.stTr || '';
        document.getElementById('doctor-tr').value = d.doctorTr || '';

        document.getElementById('doctor-main').value = d.doctorMain || d.doctor || '';

        if (Array.isArray(d.diagnoses)) {
          diagnoses = d.diagnoses;
          renderDiags();
        }

        document.querySelectorAll('textarea.f').forEach(autoResize);
      });
    }

    document.querySelector('.btn-save').onclick = saveData;

    window.setNow = function(id) {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById(id).value = `${h}:${m}`;
    };

    window.addEventListener('beforeprint', () => {
      document.querySelectorAll('textarea.f').forEach(ta => {
        ta.style.height = 'auto';
        ta.style.maxHeight = 'none';
        ta.style.overflow = 'visible';
        ta.style.minHeight = 'unset';
      });
    });
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:#fff;color:#111;font-size:14px;line-height:1.58;}
    .topbar{background:#111;color:#fff;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .topbar h1{font-size:1.05rem;font-weight:700;letter-spacing:.3px;}
    .pbadge{margin-left:auto;font-size:.82rem;line-height:1.6;text-align:right;}
    .pbadge strong{font-size:.95rem;display:block;}
    .wrap{max-width:900px;margin:0 auto;padding:14px 20px 100px;}
    .sec{margin-bottom:14px;}
    .sec-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#111;border-bottom:1.5px solid #111;padding-bottom:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
    .sec-title .arr{font-size:.75rem;color:#888;transition:transform .2s;}
    .sec-body{margin-top:9px;}
    .sec.open .sec-title .arr{transform:rotate(180deg);}
    textarea.f{
      width:100%;border:1px solid #ddd;outline:none;
      resize:none;overflow:hidden;font-family:inherit;font-size:0.96rem;
      line-height:1.58;padding:8px 6px 6px;min-height:90px;
      background:#fafafa;border-radius:4px;transition:border-color .2s;
      white-space:pre-wrap; word-wrap:break-word; word-break:break-word;
    }
    textarea.f:focus{border-color:#111;background:#fff;}
    .col-head{font-size:.82rem;font-weight:700;color:#444;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
    .col-badge{font-size:.75rem;background:#111;color:#fff;border-radius:3px;padding:1px 6px;font-weight:600;}
    .dt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
    .dt-group{display:flex;flex-direction:column;gap:4px;}
    input[type="date"], input[type="text"]{border:none;border-bottom:1px solid #ccc;outline:none;font-family:inherit;font-size:.9rem;padding:5px 3px;background:transparent;color:#111;transition:border-color .2s;min-width:140px;}
    input:focus{border-bottom-color:#111;}
    .now-btn{background:none;border:1px solid #888;border-radius:4px;padding:3px 9px;font-size:.78rem;cursor:pointer;color:#444;}
    .now-btn:hover{background:#111;color:#fff;border-color:#111;}
    .doctor-row{display:flex;align-items:center;gap:12px;margin:16px 0 10px 0;}
    .doctor-row label{font-size:0.9rem;font-weight:600;white-space:nowrap;min-width:140px;}
    .doctor-row input{flex:1;max-width:400px;border:none;border-bottom:1px solid #ccc;padding:6px 3px;font-size:0.96rem;}
    .doctor-row input:focus{border-bottom-color:#111;}
    .icd-inputs{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;padding-top:8px;}
    .icd-code-wrap{position:relative;width:115px;flex-shrink:0;}
    input.ic{width:100%;border:none;border-bottom:1.5px solid #ccc;outline:none;font-family:inherit;font-size:.96rem;padding:6px 3px;background:transparent;color:#1d4ed8;font-weight:700;}
    input.ic:focus{border-bottom-color:#1d4ed8;}
    .icd-name-wrap{flex:1;min-width:200px;position:relative;}
    input.in{width:100%;border:none;border-bottom:1.5px solid #ccc;outline:none;font-family:inherit;font-size:.96rem;padding:6px 3px;background:transparent;}
    input.in:focus{border-bottom-color:#111;}
    .add-btn{background:#111;color:#fff;border:none;border-radius:5px;padding:8px 16px;font-size:.84rem;cursor:pointer;font-weight:600;}
    .add-btn:hover{background:#333;}
    .diag-list{margin-top:14px;display:flex;flex-direction:column;gap:7px;}
    .diag-item{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f0f0f0;}
    .diag-item .code{font-size:.84rem;font-weight:700;color:#1d4ed8;background:#eff6ff;border-radius:4px;padding:3px 8px;}
    .diag-item .name{flex:1;font-size:.94rem;}
    .diag-item .rm{background:none;border:none;cursor:pointer;color:#ccc;font-size:1.2rem;padding:0 5px;}
    .diag-item .rm:hover{color:#dc2626;}
    .actions{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid #e5e7eb;padding:12px 24px;display:flex;gap:14px;justify-content:flex-end;align-items:center;z-index:50;}
    .btn-save{background:#111;color:#fff;border:none;border-radius:6px;padding:10px 28px;font-size:.96rem;font-weight:700;cursor:pointer;}
    .btn-save:hover{background:#333;}
    .btn-print{background:#fff;color:#111;border:1.5px solid #999;border-radius:6px;padding:10px 22px;font-size:.96rem;font-weight:600;cursor:pointer;}
    .btn-print:hover{background:#f9fafb;}
    .save-ok{font-size:.86rem;color:#15803d;font-weight:600;opacity:0;transition:opacity .3s;}
    .save-ok.show{opacity:1;}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 26px;border-radius:8px;font-size:.92rem;opacity:0;transition:all .3s;z-index:999;}
    .toast.show{opacity:1;}
    .toast.err{background:#dc2626;}

    @media print {
      .actions, .now-btn, .add-btn, .diag-item .rm, .sec-title .arr {
        display: none !important;
      }

      body {
        font-size: 11pt !important;
        line-height: 1.48 !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .wrap {
        padding: 10mm 12mm !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
      }

      .topbar {
        padding: 8mm 12mm !important;
      }

      textarea.f {
        display: block !important;
        position: relative !important;
        height: auto !important;
        min-height: 5cm !important;
        max-height: none !important;
        overflow: visible !important;
        overflow-y: visible !important;
        white-space: pre-wrap !important;
        word-wrap: break-word !important;
        word-break: break-word !important;
        hyphens: auto !important;
        page-break-inside: avoid !important;
        break-inside: avoid-page !important;
        break-after: auto !important;

        border: 1px solid #333 !important;
        background: white !important;
        padding: 6mm 5mm !important;
        margin: 4mm 0 6mm 0 !important;
        font-size: 10.8pt !important;
        line-height: 1.5 !important;
        box-sizing: border-box !important;
      }

      .sec, .sec-body, .diag-list, .diag-item {
        page-break-inside: avoid !important;
        break-inside: avoid-page !important;
      }

      @page {
        size: A4 portrait;
        margin: 12mm 10mm 14mm 10mm;
      }

      * {
        overflow-wrap: break-word !important;
        word-break: break-word !important;
        hyphens: auto !important;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div><h1>ემერჯენსის გასინჯვის ფურცელი</h1></div>
  <div class="pbadge">
    <strong id="pb-name">—</strong>
    <span id="pb-info"></span>
  </div>
</div>

<div class="wrap">

  <div class="sec open" id="sec-patient">
    <div class="sec-title">პაციენტის მონაცემები</div>
    <div class="sec-body">
      <table style="width:100%;border-collapse:collapse;font-size:.94rem;">
        <tr>
          <td style="width:140px;color:#555;font-weight:600;padding:5px 0;">სახელი / გვარი:</td>
          <td style="padding:5px 12px;" id="inf-name">—</td>
          <td style="width:120px;color:#555;font-weight:600;padding:5px 0;">პირადი ნომ.:</td>
          <td style="padding:5px 12px;" id="inf-pid">—</td>
        </tr>
        <tr>
          <td style="color:#555;font-weight:600;padding:5px 0;">დ/თ:</td>
          <td style="padding:5px 12px;"><span id="inf-dob">—</span> <span id="inf-age" style="color:#1d4ed8;font-weight:700;"></span></td>
          <td style="color:#555;font-weight:600;padding:5px 0;">მისამართი:</td>
          <td style="padding:5px 12px;" id="inf-addr">—</td>
        </tr>
        <tr>
          <td style="color:#555;font-weight:600;padding:5px 0;">სტაციონარში:</td>
          <td style="padding:5px 12px;" id="inf-admit" colspan="3">—</td>
        </tr>
      </table>
    </div>
  </div>

  <div class="sec" id="sec-complaints">
    <div class="sec-title" onclick="toggleSec('sec-complaints')">ჩივილები <span class="arr">▼</span></div>
    <div class="sec-body">
      <textarea class="f" id="complaints" placeholder="პაციენტის ჩივილები..."></textarea>
    </div>
  </div>

  <div class="sec" id="sec-anamnesis">
    <div class="sec-title" onclick="toggleSec('sec-anamnesis')">დაავადების ანამნეზი <span class="arr">▼</span></div>
    <div class="sec-body">
      <textarea class="f" id="anamnesis" placeholder="დაავადების ანამნეზი..."></textarea>
    </div>
  </div>

  <div class="sec" id="sec-status">
    <div class="sec-title" onclick="toggleSec('sec-status')">ობიექტური გასინჯვა — Status localis <span class="arr">▼</span></div>
    <div class="sec-body">
      <div>
        <div class="col-head"><span class="col-badge">შემოსვლა</span></div>
        <div class="dt-row">
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">თარიღი</label>
            <input type="date" id="admit-date"/>
          </div>
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">დრო</label>
            <input type="text" id="admit-time" placeholder="მაგ: 14:30"/>
          </div>
        </div>
        <textarea class="f" id="st-adm" placeholder="შემოსვლის დროს მონაცემები..."></textarea>
        <div class="doctor-row">
          <label>ექიმი:</label>
          <input type="text" id="doctor-adm" placeholder="სახელი გვარი"/>
        </div>
      </div>

      <div style="margin-top:32px;">
        <div class="col-head"><span class="col-badge">გადაყვანა</span></div>
        <div class="dt-row">
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">თარიღი</label>
            <input type="date" id="tr-date"/>
          </div>
          <div class="dt-group">
            <label style="font-size:0.78rem;color:#555;">დრო</label>
            <input type="text" id="tr-time" placeholder="მაგ: 14:30"/>
          </div>
          <button class="now-btn" onclick="setNow('tr-time')">ახლა</button>
        </div>
        <textarea class="f" id="st-tr" placeholder="გადაყვანის დროს მონაცემები..."></textarea>
        <div class="doctor-row">
          <label>ექიმი:</label>
          <input type="text" id="doctor-tr" placeholder="სახელი გვარი"/>
        </div>
      </div>
    </div>
  </div>

  <div class="sec" id="sec-diag">
    <div class="sec-title" onclick="toggleSec('sec-diag')">დიაგნოზი — Diagnosis (ICD-10) <span class="arr">▼</span></div>
    <div class="sec-body">
      <div class="icd-inputs">
        <div class="icd-code-wrap">
          <input type="text" class="ic" id="diag-code" placeholder="კოდი" maxlength="10" autocomplete="off"/>
        </div>
        <div class="icd-name-wrap">
          <input type="text" class="in" id="diag-name" placeholder="დასახელება ან ძებნა..." autocomplete="off"/>
        </div>
        <button class="add-btn" onclick="addDiag()">+ დამატება</button>
      </div>
      <div class="diag-list" id="diag-list"></div>
    </div>
  </div>

  <div class="sec" id="sec-treating-doctor">
    <div class="sec-title">მკურნალი ექიმი</div>
    <div class="sec-body">
      <div class="doctor-row" style="margin-top:6px;">
        <label>სახელი გვარი:</label>
        <input type="text" id="doctor-main" placeholder="მკურნალი ექიმის სახელი გვარი"/>
      </div>
    </div>
  </div>

</div>

<div class="actions">
  <span class="save-ok" id="save-ok">✓ შენახულია</span>
  <button class="btn-print" onclick="window.print()">🖨 ბეჭდვა</button>
  <button class="btn-save">შენახვა</button>
</div>

<div class="toast" id="toast"></div>

</body>
</html>
